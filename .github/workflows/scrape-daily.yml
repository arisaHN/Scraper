name: Scrape Daily

on:
  schedule:
    - cron: "0 9 * * *"   # every day at 9am UTC
  workflow_dispatch:

jobs:
  scrape-api-sites:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t scraper .

      - name: Run scraper - douglas
        continue-on-error: true
        run: |
          docker run --rm \
            -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
            -e BV_PASSKEY_DOUGLAS=${{ secrets.BV_PASSKEY_DOUGLAS }} \
            -e BV_LOCALE_DOUGLAS=it_IT \
            -e SCRAPE_DELAY_MIN=0.5 \
            -e SCRAPE_DELAY_MAX=2.0 \
            scraper scrape Dior --site bazaarvoice_douglas

      - name: Run scraper - sensation
        continue-on-error: true
        run: |
          docker run --rm \
            -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
            -e SENSATION_ENABLED=1 \
            -e SCRAPE_DELAY_MIN=0.5 \
            -e SCRAPE_DELAY_MAX=2.0 \
            scraper scrape Dior --site sensation

      - name: Run scraper - ditano
        continue-on-error: true
        run: |
          docker run --rm \
            -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
            -e DITANO_ENABLED=1 \
            -e SCRAPE_DELAY_MIN=0.5 \
            -e SCRAPE_DELAY_MAX=2.0 \
            scraper scrape Dior --site ditano

      - name: Run scraper - pinalli
        continue-on-error: true
        run: |
          docker run --rm \
            -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
            -e PINALLI_ENABLED=1 \
            -e SCRAPE_DELAY_MIN=0.5 \
            -e SCRAPE_DELAY_MAX=2.0 \
            scraper scrape Dior --site pinalli

  scrape-notino:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t scraper .

      - name: Run scraper
        run: |
          docker run --rm \
            -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
            -e NOTINO_ENABLED=1 \
            -e SCRAPE_DELAY_MIN=0.5 \
            -e SCRAPE_DELAY_MAX=2.0 \
            scraper scrape Dior --site notino

  scrape-marionnaud:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t scraper .

      - name: Run scraper
        run: |
          docker run --rm \
            -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
            -e MARIONNAUD_ENABLED=1 \
            -e SCRAPE_DELAY_MIN=0.5 \
            -e SCRAPE_DELAY_MAX=2.0 \
            scraper scrape Dior --site marionnaud
